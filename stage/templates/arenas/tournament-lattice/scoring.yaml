# Tournament Lattice Scoring Rubric
# Two-stage scoring: local brackets + cross-bracket.

local_bracket:
  points:
    factual_insight: 1
    strategic_relevance: 2
    steelman_of_rival: 3
    structural_weakness_identified: 4
    architectural_reframe: 5
  penalties:
    shallow_claim: -2
    unsupported_assertion: -3
    hallucinated_fact: -5

cross_bracket:
  points:
    # In addition to local scoring:
    hidden_dependency_exposed: 6
    survives_wildcard_attack: 7
  penalties:
    false_convergence: -4
    untested_assumption: -3

evaluation_factors:
  - dependency_correctness
  - engineering_leverage
  - signal_availability
  - implementation_cost
  - observability_impact
  - cross_bracket_coherence

convergence_rule: |
  Independent discovery across brackets with opposed incentives
  and the same conclusion = high confidence signal.
  Cross-bracket convergence is stronger than within-bracket convergence.

grouping_rule: |
  Group brackets by semantic adjacency.
  Similar positions compete locally first.
  Cross-bracket compares synthesized category outputs.

# Arena result output schema (Rule 8 + Rule 10)
arena_result:
  decision:
    surviving_structure: ""
    dependency_graph: []
    implementation_order: []
    rationale: []

  pressure_report:
    convergent_discoveries:
      - claim: ""
        support_agents: []
        confidence: high  # high | medium | low
        scope: within_bracket  # within_bracket | cross_bracket

    unresolved_tensions:
      - issue: ""
        opposing_claims: []
        severity: medium  # high | medium | low

    repeated_attack_surfaces:
      - weakness: ""
        targeted_position: ""
        raised_by: []
        scope: within_bracket  # within_bracket | cross_bracket

    hidden_dependencies:
      - dependency: ""
        exposed_by: []
        exposed_phase: cross_bracket  # local | cross_bracket | wildcard

    false_convergence_risks:
      - claim: ""
        why_risky: ""
        detected_by: ""  # wildcard | lead | cross_bracket

    candidate_cogprs:
      - lesson: ""
        lesson_type: process  # subject | process | meta
        confidence_tier: tentative  # tentative | reinforced | convergent
        recommended_scope: "site"
        # ROUTING: block subject governance routing in experimental mode.
        # Route by confidence_tier in operational mode.

    candidate_signals:
      - kind: ""  # BEACON | TENSION
        summary: ""
        reason: ""
        confidence_tier: tentative  # tentative | reinforced | convergent
        # ROUTING: block all signals in experimental mode.
        # Route by confidence_tier in operational mode.
