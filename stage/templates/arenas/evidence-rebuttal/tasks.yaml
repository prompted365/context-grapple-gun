# Evidence Rebuttal Arena — Task Template
# 12 tasks, 6 phases, strict dependency gating.
# Continuation arena: feeds new evidence back into parent verdicts.

agents:
  - name: EVIDENCE-ADVOCATE
    role: "New evidence materially changes parent verdicts"
  - name: ARCHITECTURE-DEFENDER
    role: "New evidence is orthogonal to architectural/structural concerns parent adjudicated"
  - name: GOVERNANCE-ARBITER
    role: "Apply governance standards to what constitutes valid authority evidence"
  - name: WILDCARD
    role: "Detect validation bias, coverage theater, false authority from evidence presence. Does not advocate."
  - name: LEAD
    role: "Orchestrator and synthesizer. Does not advocate."

phases:
  context:
    description: Each advocate studies the other two positions + the new evidence. No self-defense.
    tasks:
      - id: 1
        agent: EVIDENCE-ADVOCATE
        action: "Gather context on ARCHITECTURE-DEFENDER and GOVERNANCE-ARBITER positions. Read parent governance memo, new evidence, and opponent source material. Steelman both opponents."
        blocked_by: []
      - id: 2
        agent: ARCHITECTURE-DEFENDER
        action: "Gather context on EVIDENCE-ADVOCATE and GOVERNANCE-ARBITER positions. Read parent governance memo (especially rejected claims), new evidence, and source codebases. Steelman both opponents."
        blocked_by: []
      - id: 3
        agent: GOVERNANCE-ARBITER
        action: "Gather context on EVIDENCE-ADVOCATE and ARCHITECTURE-DEFENDER positions. Read federation governance standards, parent governance memo, and new evidence (for assertion quality, not just count). Steelman both opponents."
        blocked_by: []

  defense:
    description: Each advocate defends position and challenges rivals. Must argue specific parent claims.
    tasks:
      - id: 4
        agent: EVIDENCE-ADVOCATE
        action: "Defend: evidence changes verdicts. Argue each claim under reexamination. Challenge opponents on specific parent claims."
        blocked_by: [1, 2, 3]
      - id: 5
        agent: ARCHITECTURE-DEFENDER
        action: "Defend: evidence is orthogonal. Argue why architectural analysis holds regardless of evidence. Challenge opponents on integration fitness gap."
        blocked_by: [1, 2, 3]
      - id: 6
        agent: GOVERNANCE-ARBITER
        action: "Defend: governance standards adjudicate. Define what authority means. Challenge both opponents on evidence quality vs quantity."
        blocked_by: [1, 2, 3]

  rebuttal:
    description: Each advocate responds to attacks. Must concede where attacks land.
    tasks:
      - id: 7
        agent: EVIDENCE-ADVOCATE
        action: "Rebut attacks. Concede where evidence doesn't prove integration fitness. Hold ground where evidence IS authority for specific surfaces."
        blocked_by: [4, 5, 6]
      - id: 8
        agent: ARCHITECTURE-DEFENDER
        action: "Rebut attacks. Concede where zero tests weakens authority claims. Hold ground where architectural analysis is evidence-independent."
        blocked_by: [4, 5, 6]
      - id: 9
        agent: GOVERNANCE-ARBITER
        action: "Rebut attacks. Synthesize a governance-grounded authority definition that accounts for the evidence asymmetry."
        blocked_by: [4, 5, 6]

  wildcard_audit:
    description: Wildcard reads ALL prior outputs. Produces Fallacy/Inversion Records.
    tasks:
      - id: 10
        agent: WILDCARD
        action: |
          Read ALL outputs from tasks 1-9. Produce Fallacy/Inversion Records.
          Check for: validation bias, coverage theater, false authority from test presence,
          survivorship bias, asymmetric comparison, weight inflation.
          For each fallacy, extract the operational inverse.
          Answer: "What would the smart but wrong version of this agreement be?"
        blocked_by: [7, 8, 9]

  synthesis:
    description: Lead synthesizes verdict update with wildcard dispositions.
    tasks:
      - id: 11
        agent: LEAD
        action: "Synthesize verdict update: which parent claims change, which don't, and why. Incorporate wildcard dispositions."
        blocked_by: [10]

  pressure_extraction:
    description: Lead classifies findings for governance routing.
    tasks:
      - id: 12
        agent: LEAD
        action: "Produce pressure report: convergent discoveries, parent verdict changes, candidate CogPRs, updated authority map diff."
        blocked_by: [11]

dependency_rule: |
  context -> defense -> rebuttal -> wildcard audit -> synthesis -> pressure extraction
  No phase may start until its predecessors complete.
  The arena is not complete until both verdict update AND pressure report exist.
  Verdict changes require cited evidence (+6 scoring). Argument-only changes are penalized (-4).
