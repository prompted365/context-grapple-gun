output_requirements:
  tier_classification: |
    The synthesis MUST produce a tier classification for the binder:
    - tier_1_harvest: directly usable, minimal adaptation
    - tier_2_adapt: valuable with modification (most likely outcome given naming collision)
    - tier_3_investigate: potentially critical, needs deeper assessment
    - discard: not worth mining

  harpoon_manifest: |
    If tier_1 or tier_2, the synthesis MUST produce a harpoon manifest following
    the triad-fusion precedent (tier_1_harvest, tier_2_adapt, tier_3_investigate,
    discard, assembly). For this binder, "crates" are replaced by "document sections"
    and "artifacts" — the extractable units are invariants, patterns, formulas,
    diagrams, and policy designs rather than code modules.

  constitutional_patterns: |
    The synthesis MUST enumerate constitutional patterns exposed by this binder,
    regardless of tier. Each pattern needs:
    - pattern_name
    - description
    - federation_surfaces_served
    - estate_surfaces_served
    - existing_primitives (what canonical already has)
    - gap (what's missing)

  cross_office_leverage_map: |
    For each proposed action (harvest section, extract pattern, or build primitive):
    - Which federation-level surfaces does it serve?
    - Which estate-level surfaces does it serve?
    - What is the leverage ratio (surfaces served / implementation cost)?

  invariant_weight_map: |
    EXPERIMENTAL OUTPUT: The synthesis must produce:
    1. Stance-load vector: {HARVEST: N, MINE: N, CATALYZE: N} — aggregate affinity
    2. Top 5 convergent invariants (all stances agree on importance)
    3. Top 5 contested invariants (stances disagree on alignment)
    4. Top 5 lock-pressure pairs (highest inter-stance tension)
    5. Coverage classifier distribution: how many serviceable / rare_tail / coverage_gap
    6. Meta-assessment: does the weighting method produce useful signal?

  self_referential_evidence: |
    ADVOCATE-CATALYZE must examine whether its own "build the primitive" argument
    is genuinely higher leverage or whether it's NIH bias. The evidence is in the
    specifics: name the primitives, name the offices they serve, name the outcomes.

    ADVOCATE-HARVEST must examine whether the naming collision is truly editorial
    or whether it reveals a deeper semantic identity problem that wholesale adoption
    would import into federation doctrine.

    ADVOCATE-MINE must examine whether the extracted patterns are actually more
    valuable separated from the integrated proposal, or whether decomposition
    loses the binder's coherent constitutional narrative.

scoring_notes: |
  Standard governed-harpoon-triangulation scoring with these additions:

  BONUS: cross_office_discovery (+6)
    Awarded when an advocate identifies a specific constitutional pattern that serves
    3+ federation/estate surfaces with concrete evidence.

  BONUS: reflexive_governance_insight (+4)
    NEW for this arena. Awarded when an advocate uses the binder's own governance
    formulas (activation, lock-pressure, methylation) to evaluate the binder itself,
    producing a genuine insight about the formulas' utility or failure mode.

  PENALTY: vague_leverage_claim (-3)
    "Many surfaces" without naming specific offices/outcomes.

  PENALTY: naming_collision_handwave (-2)
    NEW for this arena. Awarded when an advocate dismisses the semantic identity
    collision without engaging with the federation's semantic identity contract
    requirements or the existing collision registry.

  PENALTY: invariant_inflation (-2)
    NEW for this arena. Awarded when an advocate treats invariants that merely
    restate existing canonical doctrine as novel contributions from the binder.

