output_requirements:
  constitutional_impact_verdict: |
    The synthesis MUST produce a constitutional impact assessment:
    - ADMIT: expand doctrine with the binder's novel content
    - DEFEND: reject expansion, extend existing doctrine minimally
    - COMPRESS: restructure governance shape before admitting content
    - PHASED: some combination (e.g., compress first, then admit selectively)

  governance_weight_analysis: |
    - Current invariant count in CLAUDE.md
    - Proposed addition count
    - Operator cognitive load estimate (can a new session reasonably absorb the full doctrine?)
    - Governance debt created by the proof-obligation retrofit

  surviving_structure: |
    What survives all three rounds of adversarial argument?
    What does NOT survive? Be specific.

