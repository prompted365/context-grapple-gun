scoring_notes: |
  Standard governed-triangulation scoring plus:

  BONUS: governance_weight_evidence (+4)
    Awarded when an advocate produces concrete evidence about governance weight
    (operator reading time, invariant attention decay, enforcement gap between
    inscribed and practiced law).

  PENALTY: expansion_handwave (-3)
    Awarded when ADMIT claims "more law = better governed" without addressing
    cognitive load, enforcement feasibility, or attention dilution.

  PENALTY: inaction_excuse (-3)
    Awarded when DEFEND uses "coherence" to avoid addressing genuine zero-coverage
    gaps that produce real governance liability.

  PENALTY: compression_fantasy (-3)
    Awarded when COMPRESS proposes restructuring without a feasible timeline or
    without acknowledging that restructuring has been deferred for 117 tics.
