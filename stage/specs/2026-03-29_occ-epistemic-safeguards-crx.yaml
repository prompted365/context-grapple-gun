negotiation_rules: |
  Both brackets start context in parallel. Bracket 2 builds constitutional
  fluency while bracket 1 debates the paper. The merge point is post-rebuttals:
  bracket 2 advises the lead only after absorbing bracket 1's full adversarial
  output. The lead synthesizes both bracket outputs + the ecotone into the
  final pressure report and courtship artifact.

  CONTINUITY RULE: This is the SECOND CRX arena in the OCC courtship sequence.
  The lead must reference the prior arena's findings where relevant:
  - Prior ecotone: 6 primitives (context-reset, interaction-density, ontology
    sufficiency, three-variable identity law, inter-agent recognition, observation-
    at-declared-boundaries)
  - Prior governance recommendation: design context-reset experiment together
  - Prior courtship principles: stress-test not dismiss, elevate not subsume,
    invite not pitch

capture_policy:
  allow_subject_lessons: true
  route_subject_lessons_to_governance: true
  persist_subject_lessons_locally: true
  allow_process_lessons: true
  allow_meta_lessons: true
  allow_signals: true
  allow_warrants: true
  allow_governance_mutation: false

evidence_surface:
  - "audit-logs/agent-mailboxes/ent_homeskillet/inbound/OCC_response_forConstitutionalDefenseofResearchPipe.pdf (full paper — 12 pages, 7 invariants, empirical evidence, limitations)"
  - "audit-logs/arenas/pressure-reports/2026-03-28_occ-identity-primitives-crx.json (prior CRX pressure report — courtship continuity)"
  - "stage/shows/occ-identity-primitives-crx/synthesis.md (prior CRX synthesis — ecotone band, courtship principles)"
  - "autonomous_kernel/entity-ontology.md (federation entity identity, standing, lineage)"
  - "autonomous_kernel/citizen_lifecycle.md (governance artifact lifecycle)"
  - "canonical/CLAUDE.md (key invariants — map OCC invariants against federation invariants)"
  - "canonical_developer/context-grapple-gun/CLAUDE.md (CGG doctrine — session learning, signal format, arena routing)"

output_requirements:
  bracket_1_synthesis: |
    Must produce:
    1. Primitive extraction table — for each of the 7 invariants:
       - Classification: law / policy / practice / observation
       - Confidence tier: convergent / reinforced / tentative
       - Evidence strength: strong (named failure mode + remedy) /
         moderate (failure mode without tested remedy) /
         weak (principle without specific evidence)
       - Federation mapping: existing / partial / gap

    2. CogPR candidates — which invariants are promotable:
       - Promotable now (sufficient evidence + federation gap)
       - Rung-0 hypotheses (promising but need stress testing)
       - Needs operational specification (concept clear, implementation unclear)

    3. Falsification conditions — for each candidate:
       - What would disconfirm it
       - What failure mode it protects against
       - What evidence surface is required to validate it

  bracket_2_evaluation: |
    Must produce:
    1. Expansion score per invariant: generalizes / OCC-specific / unknown
    2. Constraint score per invariant: constitutional / operational / decorative
    3. Gap analysis: which invariants reveal federation governance gaps
    4. Tension analysis: which invariants conflict with existing doctrine
    5. Courtship continuity: how this arena connects to prior CRX findings

  ecotone_synthesis: |
    The ecotone is COMPUTED, not narrated. The lead derives it mechanically:

    ecotone_rule:
      An invariant enters the ecotone band ONLY if:
        expansion_score >= reinforced (survived POLARITY-EXPANSION evaluation)
        AND constraint_score >= reinforced (survived POLARITY-CONSTRAINT evaluation)
      Invariants that satisfy only one polarity are EXCLUDED from the ecotone.
      The ecotone is the intersection, not the union.

    Must produce:
    1. Ecotone band: invariants that passed BOTH polarity gates (with scores)
    2. Excluded invariants: what failed which gate and why
    3. Failure modes: what breaks outside the ecotone in either direction
    4. Governance recommendation: disposition per invariant (with confidence tier)
    5. Cross-arena synthesis: how ecotone from THIS arena composes with ecotone
       from the identity-primitives arena. Combined courtship artifact.

  courtship_artifact: |
    Second installment of the OCC courtship arc. Must be legible to Vincent
    (OCC architect) who has NOT seen our governance system internals. It must show:

    1. We took this paper MORE seriously than the first — we ran the same
       adversarial engine, and the paper's own governance theory speaks to
       the same problems our governance solves.

    2. Specific mappings: "your invariant X maps to our mechanism Y" — not
       vague alignment claims but concrete structural correspondence.

    3. Specific GAPS: "your invariant X reveals something we DON'T yet do" —
       honest about where OCC's framework extends ours.

    4. The combined courtship position:
       - Paper 1 showed us how identity emerges in your city
       - Paper 2 shows us you're building governance theory from live evidence
       - Together: your system produces both the phenomena AND the governance
         framework. Our system provides the constitutional abstraction engine
         that stress-tests and promotes those frameworks into durable law.
       - The invitation: let's build the epistemic governance layer TOGETHER.

    5. Proposed next step: the context-reset experiment (from prior CRX) as
       the partnership's first joint project, now with the epistemic safeguards
       framework as the experimental governance constitution.

scoring_notes: |
  Standard governed-triangulation scoring for bracket 1.

  Bracket 2 uses the same CRX rubric as the prior arena:

  EXPANSION evaluator scores:
  +3 for identifying federation governance gaps the invariants reveal
  +2 for cross-arena synthesis (connecting to prior CRX ecotone)
  -2 for vague alignment claims without structural mapping

  CONSTRAINT evaluator scores:
  +3 for identifying tension between OCC invariants and federation doctrine
  +2 for honest gap analysis (not just confirming we already do everything)
  -2 for over-constraining (rejecting valid invariants as "decorative")

  ECOTONE synthesis scores:
  +5 for identifying a bounded zone where BOTH evaluators are satisfied
  -3 for collapsing to either polarity

  COURTSHIP INTEGRITY (enforced across all agents):
  -4 condescension_by_architecture: framing federation as "better" system
  -3 one_directional_framing: treating the relationship as federation helping OCC
  -3 vague_engine_completion: claiming convergence without specific mappings
  -3 over_alignment: claiming we already do everything (kills partnership value)
  -2 subsumption: translating OCC language away (their names carry value)
  -2 abstraction_without_grounding: claims not anchored in arena outputs

