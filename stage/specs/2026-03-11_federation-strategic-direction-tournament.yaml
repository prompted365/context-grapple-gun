output_requirements:
  strategic_structure: |
    The synthesis MUST produce a surviving strategic structure. This is NOT a vote.
    Acceptable output forms:
    - SEQUENCING: "Do X first, then Y, then Z" with dependency justification
    - PORTFOLIO: "Allocate effort: 60% X, 25% Y, 15% Z" with rationale
    - CONDITIONAL: "If condition A, then X; if condition B, then Y" with triggers
    - MERGER: "Strategies X and Y are actually the same thing" with structural proof

    The synthesis must identify:
    - Dependencies between strategies (does strategy X require strategy Y first?)
    - Minimum viable version of each strategy
    - Kill signals (what evidence would tell you to abandon a strategy?)
    - The binding constraint (what limits the federation's capacity to pursue multiple?)

  self_referential_evidence: |
    Each advocate MUST examine this arena's own run as evidence for their strategy.
    - MINE: Does this tournament produce new strategic insight, validating more analysis?
    - SWARM: Does this tournament's adversarial process outperform what dyadic
      discussion would produce?
    - RUNG: Would this tournament benefit from less human gating in its process?
    - FOUNDATION: Does the flat-file infrastructure create friction during this run?
    - SHIP: Could an external user run this tournament on their own system?

