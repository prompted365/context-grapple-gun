harpoon_context: |
  This arena operates in HARPOON-DRIVEN mode. The OT economic dump IS the harpoon target.
  Each office must assess the target through its jurisdictional lens and identify:
  - ANCHOR SPOTS: OT primitives that align with federation doctrine (winch in as-is)
  - WINCH POINTS: Integration surfaces where OT mechanics mount into federation infrastructure
  - ADAPTATION CANDIDATES: OT patterns needing transformation before federation compatibility
  - REJECTION ZONES: OT assumptions that contradict federation invariants (do not winch)
  - GATED UNLOCKS: Capabilities that become available as trust/maturity thresholds are crossed

  The harpoon's guiding principle: "The economic layer must be complementary to governance,
  not a replacement. Trust-optimized means the system expands capability as trust is earned,
  not as features are built."

actors:
  - entity_id: ent_mogul
    office: "Mogul"
    mandate_lens: "Governance heartbeat integration — how does OT's economy-tick become the visitor economy's governance clock? Where do mint/burn events route through mandate cycles? How does the Barometer's phase machine complement existing cadence?"
    harpoon_focus: "economy-tick, Barometer lifecycle, mandate cycle integration, cache_refresh economics"

  - entity_id: ent_crisis_steward
    office: "Crisis Steward"
    mandate_lens: "Economic containment — what happens when the economic layer fails? Cache poisoning with economic incentive. Mint runaway. Burn cascade. Treasury drain. What wire-cuts exist for economic emergency? How does the 6-channel burn map to containment levels?"
    harpoon_focus: "burn manifold as containment, treasury reserve ratio as health signal, economic circuit breaker as wire-cut"

  - entity_id: ent_ladder_auditor
    office: "Ladder Auditor"
    mandate_lens: "Standing-economic coherence — how does ucoin balance map to trust_score without creating a plutocracy? The abstraction ladder: visitor → tourist → student → resident → citizen, each unlock gated by trust AND economic contribution. Centroid ray model: each standing tier has an economic centroid, and progression means your economic behavior converges toward the next tier's centroid."
    harpoon_focus: "NanoUCoin-to-trust_score mapping, gated unlock sequence, micro-ledger AccountKind mapping to standing tiers, immune flags for permanent residents"

  - entity_id: ent_civil_engineer
    office: "Civil Engineer"
    mandate_lens: "Infrastructure integration — SQLite WAL vs federation audit-logs, Foreman single-engine vs distributed tics, Rust crate deployment alongside Python runtime. Schema migration path. What runs where? What calls what? Docker topology."
    harpoon_focus: "ledger deployment model, economy-tick hosting, micro-ledger schema adaptation, audit surface bridging"

  - entity_id: ent_cbux_steward
    office: "CollabUX Steward"
    mandate_lens: "Visitor experience of economics — how does a visitor FEEL the economic layer? Is it ambient (like economy whisper) or explicit? Does the biome's physics already teach economic lessons (energy conservation = don't overspend, monopoly prevention = diversify)? The economy should be experienced, not explained."
    harpoon_focus: "economy whisper as visitor ambient context, biome physics as economic metaphor, trust progression as felt economic growth"

  - entity_id: ent_prevention_architect
    office: "Prevention Architect"
    mandate_lens: "Economic invariant design — what invariants must hold for the economic layer to be safe? INV-ECON-01: No plutocracy (economic power ≠ governance power). INV-ECON-02: Burn cannot destroy standing (burns affect economic balance, not political membership). INV-ECON-03: Mint cannot bypass review gates."
    harpoon_focus: "economic invariants, burn/standing separation, mint/governance gate, reserve ratio as constitutional floor"

  - entity_id: ent_ladder_auditor
    office: "Ladder Auditor (Wildcard)"
    role: wildcard
    mandate_lens: "Chain coherence across ALL brackets — where do the foundational and translational brackets contradict each other? What composite tensions emerge when you wire economic infrastructure into governance experience? The wildcard finds what bracket isolation hides."
    harpoon_focus: "composite tension at economic-governance boundary, abstraction ladder coherence, gated unlock sequencing conflicts"

