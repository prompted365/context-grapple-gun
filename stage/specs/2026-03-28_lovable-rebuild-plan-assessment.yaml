output_requirements:
  verdict: |
    The synthesis must produce a clear verdict:
    - SHIP AS-IS: prompt is ready, send it
    - SHIP WITH PATCHES: prompt needs specific additions before sending
    - HOLD FOR REARCHITECT: structural problems need resolution first

    If SHIP WITH PATCHES, the synthesis must produce the exact patch text
    to append to the prompt — not instructions, the actual text.

