friction_invariant_candidates:
  - id: "FI-1"
    name: "Path Resolution Envelope"
    band: "PRIMITIVE"
    friction: "Hooks installed outside plugin tree cannot use relative paths"
    revision_trail: "cwd was wrong → walked from cwd → walked from file_path → multi-candidate fallback"
  - id: "FI-2"
    name: "Installed Runtime Correctness"
    band: "PRIMITIVE"
    friction: "Source repo correctness does not imply runtime correctness"
    revision_trail: "inline python in bash → quoting collapse → extracted to .py file"
  - id: "FI-3"
    name: "Manifest Consumption Atomicity"
    band: "PRIMITIVE"
    friction: "N consumers must see same manifest version"
    revision_trail: "hardcoded INSTALL_TARGETS in both → extracted to shared JSON → self-awareness check added"
  - id: "FI-4"
    name: "Sub-Repo Versioning Isolation"
    band: "PRIMITIVE"
    friction: "Sub-repo dirty state invisible to parent git"
    revision_trail: "checked parent git → silence → discovered CGG has own .git → walk-up detection added"
  - id: "FI-5"
    name: "Dual-Read Consistency"
    band: "COGNITIVE"
    friction: "Two consumers reading mutable structure need temporal ordering"
    revision_trail: "both read independently → no atomic envelope → documented as accepted risk"
  - id: "FI-6"
    name: "Error Transparency in Subprocess Extraction"
    band: "COGNITIVE"
    friction: "Parse errors must not silently return empty values"
    revision_trail: "python3 -c silent fallback → empty string indistinguishable from parse failure"
  - id: "FI-7"
    name: "Manifest Drift Self-Awareness"
    band: "COGNITIVE"
    friction: "Configuration consumed by its own checker creates feedback loop"
    revision_trail: "manifest is a weighed surface → special-case detection → post-commit auto-sync"

