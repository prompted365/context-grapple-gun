output_requirements:
  routing_function: |
    The synthesis MUST produce a routing function: task_class → budget_regime.
    This is not a vote for a winner. It is a mapping that says:
    "tasks of class X get regime Y because Z."

    Minimum task classes to route:
    - arena_advocate (governed triangulation phase work)
    - arena_lead (synthesis + pressure extraction)
    - mogul_cycle (governance scan cycle)
    - code_implementation (bounded engineering task)
    - architecture_design (unbounded design/doctrine task)
    - research_exploration (open-ended investigation)
    - simple_query (lookup, status check, single-file edit)

  execution_envelope: |
    The synthesis MUST propose an execution envelope schema — the primitive
    that carries budget metadata from the routing function to the spawning
    mechanism. This schema should be minimal:
    - task_class (string)
    - budget_regime (liberal|middle|low)
    - max_turns (integer)
    - override_allowed (boolean — can the spawner override?)
    - override_justification (string — required if override_allowed)

  self_referential_evidence: |
    Each advocate MUST examine this arena's own run as evidence.
    - LIBERAL: Does this 28-turn budget produce better architecture output?
    - MIDDLE: Would 18 turns have been sufficient for this arena?
    - LOW: Is this arena producing padding after turn 8?

