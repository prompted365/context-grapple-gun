output_requirements:
  tier_classification: |
    The synthesis MUST produce a tier classification for the target:
    - tier_1_harvest: directly usable, minimal adaptation
    - tier_2_adapt: valuable with modification
    - tier_3_investigate: potentially critical, needs deeper assessment
    - discard: not worth mining

  harpoon_manifest: |
    If tier_1 or tier_2, the synthesis MUST produce a harpoon manifest following
    the triad-fusion precedent structure (tier_1_harvest, tier_2_adapt,
    tier_3_investigate, discard, assembly).

  constitutional_patterns: |
    The synthesis MUST enumerate constitutional patterns exposed by this target,
    regardless of tier classification. Each pattern needs:
    - pattern_name
    - description (what it is)
    - federation_surfaces_served (which offices benefit)
    - estate_surfaces_served (which domains benefit)
    - existing_primitives (what we already have that partially covers this)
    - gap (what's missing)

  cross_office_leverage_map: |
    The synthesis MUST produce a leverage map:
    - For each proposed action (harvest, mine, or build primitive):
      - Which federation-level surfaces does it serve?
      - Which estate-level surfaces does it serve?
      - What is the leverage ratio (surfaces served / implementation cost)?

  self_referential_evidence: |
    ADVOCATE-CATALYZE must examine whether its own "build the primitive" argument
    is genuinely higher leverage or whether it's NIH bias. The evidence is in the
    specifics: name the primitives, name the offices they serve, name the outcomes.
    Vague "this could serve many verticals" claims without specific office enumeration
    are scored as shallow_claim (-2).

    ADVOCATE-HARVEST must examine whether "ship the vertical" creates technical debt
    that the federation has to clean up later. The evidence is in the coupling: which
    prompts depend on tools we don't control?

scoring_notes: |
  This arena uses the standard governed-triangulation scoring rubric with one addition:

  BONUS: cross_office_discovery (+6)
    Awarded when an advocate identifies a specific constitutional pattern that serves
    3+ federation/estate surfaces with concrete evidence. This is higher than
    architectural_reframe (+5) because cross-office leverage is the binding question.

  PENALTY: vague_leverage_claim (-3)
    Awarded when an advocate claims cross-office leverage without naming specific
    surfaces, specific outcomes, or specific implementation paths. "This could serve
    many verticals" without enumeration is worse than unsupported_assertion because
    it sounds structural but isn't.

