operator_authorization: "Tic 179 cadence handoff (~/.claude/plans/shimmering-tumbling-dawn.md), Action B — Stage MEMORY.md trim arena"
sign_off_gate: "Operator-pending sign-off REQUIRED before execution. This spec authors only — no advocate spawning, no trim mutation, no LEAD synthesis until operator approves."

decision_context: |
  MEMORY.md at ~/.claude/projects/-Users-breydentaylor-canonical/memory/MEMORY.md
  is the index file always loaded into Claude Code session context. Target was
  ~200 lines. Current state: ~1192 lines, ~30KB+. The harness reports truncation
  at line ~200 already during cold load, which means later index entries are
  silently dropped from session context.

  The trim is multi-tic overdue. Two prior CogPR candidates already exist and
  bear on the question (pre-publication audit gate, authored-persona-substrate-
  capacity), and may absorb several existing entries by themselves on promotion.

  This is NOT "should we trim?" — the operator has authorized it. The question
  is HOW: what stays, what moves to topic files, what archives to cogpr-archive.md,
  what deletes outright, and what reasoning grounds each call.

  The arena does NOT prescribe a stance. Each actor receives the seed evidence
  and derives position from the invariant their mandate makes them care about.
  No trim ratio, no default disposition, no entry classification is prescribed
  by this spec. The LEAD synthesizes from the actors' independent proposals;
  the operator approves before any trim executes.

  The wildcard is a temporal-perspective stress test: a future operator on cold
  pickup at tic 250 (~70 tics out), reading MEMORY.md to figure out what is
  still load-bearing. This wildcard catches composite tensions invisible to
  bracket-isolated advocates per Composite Mutation Assessment at LEAD level.

