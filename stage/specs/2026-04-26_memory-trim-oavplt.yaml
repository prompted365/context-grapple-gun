id: "2026-04-26_memory-trim-oavplt"
title: "What is the minimum-viable shape of MEMORY.md (currently ~1192 lines) that preserves cold-pickup function while honoring the federation's lesson lineage?"
arena: office-autonomous-vpl-temporal
arena_mode: operational
status: pending
template_ref: "stage/templates/arenas/office-autonomous-vpl/spec.md"
