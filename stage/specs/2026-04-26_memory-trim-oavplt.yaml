    - path: "/Users/breydentaylor/.claude/CLAUDE.md"
      description: "Auto-memory architecture — MEMORY.md as one-line index, topic files for detail"
  operational_state:
    - path: "/Users/breydentaylor/.claude/projects/-Users-breydentaylor-canonical/memory/cogpr-archive.md"
